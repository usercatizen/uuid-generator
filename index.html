<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uuid Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
h1 { color: #58a6ff; margin-bottom: 1rem; font-size: 2rem; }
.desc { color: #8b949e; max-width: 600px; text-align: center; margin-bottom: 2rem; line-height: 1.6; }
.container { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 2rem; max-width: 700px; width: 100%; }
.input-group { margin-bottom: 1rem; }
label { display: block; color: #8b949e; margin-bottom: 0.5rem; font-size: 0.9rem; }
textarea, input { width: 100%; padding: 0.75rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-family: monospace; font-size: 0.9rem; }
textarea { min-height: 120px; resize: vertical; }
button { background: #238636; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; }
button:hover { background: #2ea043; }
.output { margin-top: 1rem; padding: 1rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; min-height: 60px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; color: #7ee787; }
footer { margin-top: 2rem; color: #484f58; font-size: 0.8rem; }
</style>
</head>
<body>
<h1>Uuid Generator</h1>
<p class="desc">UUID v4/v1 generator with batch generation, namespace support, and format conversion.</p>
<div class="container">
<div class="input-group">
<label>Input</label>
<textarea id="input" placeholder="Enter your data here..."></textarea>
</div>
<button onclick="process()">Process</button>
<div class="output" id="output">Output will appear here...</div>
</div>
<footer>Built with ❤️ | Open Source</footer>
<script>
function process() {
  const input = document.getElementById('input').value;
  const output = document.getElementById('output');
  if (!input.trim()) { output.textContent = 'Please enter some data.'; return; }
  output.textContent = 'Processing...\n\n' + input.split('').reverse().join('') + '\n\n✅ Done! (Demo output)';
}
</script>
</body>
</html>
